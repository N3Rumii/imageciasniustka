worker_processes 1;
error_log /data/data/com.termux/files/home/hosting_cias/nginx_error.log;
pid /data/data/com.termux/files/home/hosting_cias/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /data/data/com.termux/files/usr/etc/nginx/mime.types;
    default_type application/octet-stream;

    # Opus audio — not always in default mime.types
    types {
        audio/opus opus;
        audio/ogg  ogg;
    }

    access_log /data/data/com.termux/files/home/hosting_cias/nginx_access.log;

    sendfile on;
    gzip on;
    gzip_types application/json text/css application/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;
    keepalive_timeout 65;

    server {
        listen 6666;
        server_name localhost;

        client_max_body_size 100M;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; font-src 'self' data: https:; frame-src 'self' https:; connect-src 'self' https:; media-src 'self' blob: https:" always;

        # Serve static files from the client
        root /data/data/com.termux/files/home/hosting_cias/client/public;
        index index.htm index.html;

        # API proxy to Python server
        location /api/ {
            proxy_pass http://127.0.0.1:6667/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_request_buffering off;
        }

        # Avatars — never cache (Cloudflare + browser)
        location /data/avatars/ {
            alias /data/data/com.termux/files/home/hosting_cias/data/avatars/;
            expires -1;
            add_header Cache-Control "no-store, must-revalidate";
        }

        # Data directory for uploaded files
        location /data/ {
            alias /data/data/com.termux/files/home/hosting_cias/data/;
            expires 1h;
            add_header Cache-Control "public";
        }

        # Never cache HTML and JS — force fresh loads after deploys
        location ~* \.(html?|js)$ {
            expires -1;
            add_header Cache-Control "no-store, must-revalidate";
        }

        # Chat app — standalone SPA (^~ prevents regex locations from stealing it)
        location ^~ /chat/ {
            alias /data/data/com.termux/files/home/hosting_cias/client/chat/;
            index index.html;
            try_files $uri $uri/ /chat/index.html;
        }

        location / {
            try_files $uri $uri/ /index.htm;
        }
    }
}
